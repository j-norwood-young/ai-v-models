services:
  # API, bundled admin UI (/), docs (/docs/), and Swagger (/api/docs/) on port 4000.
  proxy:
    build: .
    ports:
      - "${AIVM_HOST_PROXY_PORT:-4000}:4000"
    volumes:
      - aivm-data:/data
    environment:
      AIVM_HOST: "0.0.0.0"
      AIVM_PORT: "4000"
      AIVM_DATA_DIR: "/data"
      AIVM_LOG_LEVEL: "info"
      AIVM_LOG_FORMAT: "json"
      AIVM_DOCKER: "1"
      AIVM_CORS_ORIGINS: "${AIVM_CORS_ORIGINS:-http://localhost:4000,http://localhost:5173}"
      AIVM_URL: "http://localhost:${AIVM_HOST_PROXY_PORT:-4000}"
      AIVM_WEB_URL: "http://localhost:${AIVM_HOST_WEB_PORT:-5173}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Admin UI on the familiar dev port (proxies to the proxy service).
  web:
    image: nginx:1.27-alpine
    ports:
      - "${AIVM_HOST_WEB_PORT:-5173}:80"
    volumes:
      - ./docker/admin-ui.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      proxy:
        condition: service_healthy
    restart: unless-stopped

  # Demo: LM Studio backend mock (for testing)
  mock-backend:
    build:
      context: .
      dockerfile: tools/mock-backend/Dockerfile
    ports:
      - "${AIVM_HOST_MOCK_PORT:-11434}:11434"
    environment:
      MOCK_PORT: "11434"
      MOCK_PROVIDER: "lmstudio"
      MOCK_HOST_NAME: "mock-host"
    profiles:
      - testing

volumes:
  aivm-data:
